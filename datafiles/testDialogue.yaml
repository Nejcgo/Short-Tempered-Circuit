Physics was never something I was good at.
It's interesting, don't get me wrong.
I find it fascinating how accurately a person can predict what will happen in machines, even if they never tested it before.
But, that's the thing, machines.
You can't use physics to predict what a person is thinking of, what they'll do, or even where they currently are.
Even psychology struggles with determining these things accurately. Maybe it's impossible, don't ask me, though.
I never know what they want. Sometimes, I don't even know what I want.
What do I really want to do in life? Well, I do like design. Websites and apps, that kind of thing.
The design of an app can affect how people feel.
That might be the trick. Not bothering with figuring it out, but making them the feelings you want?
…
No, but that's not right.
Ethics and allat.
There has to be some sort of way to help people without manipulation.
Maybe something like therapy, but you already know what they want, so you just do that.
…
I failed physics the first time.
I can't wrap my head around the concept of electricity. It doesn't make any sense.
